<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5ce0d8"/>
    </marker>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5bf5e8"/>
      <stop offset="100%" stop-color="#3ab5ad"/>
    </linearGradient>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5c842"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0f1923"/>

  <!-- Title (logo) -->
  <g transform="translate(310, 16) scale(0.7)">
    <!-- Logomark: document with publish arrow -->
    <g transform="translate(28, 24)">
      <path d="M4,4 L48,4 L60,16 L60,88 Q60,92 56,92 L4,92 Q0,92 0,88 L0,8 Q0,4 4,4 Z" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
      <path d="M48,4 L48,16 L60,16" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
      <line x1="12" y1="30" x2="44" y2="30" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="12" y1="42" x2="38" y2="42" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="12" y1="54" x2="42" y2="54" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
      <line x1="28" y1="72" x2="80" y2="72" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <polyline points="70,62 80,72 70,82" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Wordmark -->
    <text x="132" y="82" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="56" font-weight="700" letter-spacing="-1.5">
      <tspan fill="#4ecdc4">in</tspan><tspan fill="#edf2f7">post</tspan>
    </text>
    <line x1="200" y1="92" x2="370" y2="92" stroke="#4ecdc4" stroke-width="1.5" opacity="0.3"/>
    <text x="134" y="114" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="12.5" fill="#5a7a8e" font-weight="500" letter-spacing="3">NOTEBOOK TO LINKEDIN</text>
  </g>

  <!-- ════════════════════════════════════════════════ -->
  <!-- NOTE-TAKING APPS (left) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="40" y="140" width="200" height="240" rx="10" fill="#151f2b" stroke="#2a3a4e" stroke-width="1.5"/>
  <text x="140" y="172" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Note-Taking Apps</text>

  <!-- Notion -->
  <rect x="60" y="192" width="160" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <rect x="72" y="201" width="16" height="16" rx="2" fill="#ffffff"/>
  <text x="100" y="214" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#c8d6e5">Notion</text>
  <text x="208" y="214" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#5ce0d8">API</text>

  <!-- Obsidian -->
  <rect x="60" y="234" width="160" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <circle cx="80" cy="251" r="8" fill="#7c3aed" opacity="0.8"/>
  <text x="100" y="256" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#c8d6e5">Obsidian</text>
  <text x="208" y="256" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#5ce0d8">Vault</text>

  <!-- OneNote -->
  <rect x="60" y="276" width="160" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <rect x="72" y="285" width="16" height="16" rx="2" fill="#7b1fa2" opacity="0.8"/>
  <text x="100" y="298" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#c8d6e5">OneNote</text>
  <text x="208" y="298" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#5ce0d8">API</text>

  <!-- Evernote -->
  <rect x="60" y="318" width="160" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <rect x="72" y="327" width="16" height="16" rx="2" fill="#2dbe60" opacity="0.8"/>
  <text x="100" y="340" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#c8d6e5">Evernote</text>
  <text x="208" y="340" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#5ce0d8">API</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- INPOST (centre) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="320" y="140" width="260" height="240" rx="10" fill="#151f2b" stroke="#5ce0d8" stroke-width="2"/>

  <!-- inpost header -->
  <rect x="320" y="140" width="260" height="44" rx="10" fill="#1a3040"/>
  <rect x="320" y="174" width="260" height="10" fill="#1a3040"/>
  <text x="450" y="172" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#7a8fa6">TypeScript CLI</text>

  <!-- AI Transform -->
  <rect x="340" y="198" width="220" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <text x="450" y="216" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#f5c842">AI Transform</text>
  <text x="450" y="228" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#7a8fa6">Groq / Gemini / Claude</text>

  <!-- Tone + Hashtags -->
  <rect x="340" y="240" width="220" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <text x="450" y="258" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#c8d6e5">Tone Rewriting</text>
  <text x="450" y="270" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#7a8fa6">Hashtags / Thread Splitting</text>

  <!-- Interactive Refinement -->
  <rect x="340" y="282" width="220" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <text x="450" y="300" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#c8d6e5">Refinement</text>
  <text x="450" y="312" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#7a8fa6">Interactive review before publish</text>

  <!-- Schedule -->
  <rect x="340" y="324" width="220" height="34" rx="6" fill="#1c2936" stroke="#2a3a4e" stroke-width="1"/>
  <text x="450" y="342" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#c8d6e5">Scheduling</text>
  <text x="450" y="354" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#7a8fa6">Cron-based delivery</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- LINKEDIN (right) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="660" y="190" width="200" height="140" rx="10" fill="#151f2b" stroke="#2a3a4e" stroke-width="1.5"/>

  <!-- LinkedIn icon — proper "in" logo -->
  <rect x="680" y="216" width="36" height="36" rx="6" fill="#0a66c2"/>
  <text x="688" y="244" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" font-style="italic" fill="#ffffff">in</text>

  <text x="726" y="233" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#ffffff">LinkedIn</text>
  <text x="726" y="248" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#7a8fa6">Publishing API</text>

  <text x="760" y="286" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#c8d6e5">Direct publishing</text>
  <text x="760" y="304" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#c8d6e5">Scheduled delivery</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- GITHUB ACTIONS (bottom) -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="280" y="430" width="340" height="68" rx="10" fill="#151f2b" stroke="#2a3a4e" stroke-width="1.5"/>

  <!-- GH Actions icon -->
  <circle cx="316" cy="464" r="16" fill="#1c2936" stroke="#7a8fa6" stroke-width="1"/>
  <!-- Simple play/workflow icon -->
  <polygon points="310,456 310,472 322,464" fill="#7a8fa6"/>

  <text x="344" y="456" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff">GitHub Actions</text>
  <text x="344" y="472" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#7a8fa6">CI/CD automation</text>
  <text x="344" y="486" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#5a6f85">Triggers pipeline on schedule or push</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ════════════════════════════════════════════════ -->

  <!-- Notes → inpost -->
  <line x1="240" y1="260" x2="316" y2="260" stroke="#5ce0d8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="278" y="252" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#5ce0d8">content</text>

  <!-- inpost → LinkedIn -->
  <line x1="580" y1="260" x2="656" y2="260" stroke="#5ce0d8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="618" y="252" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#5ce0d8">publish</text>

  <!-- GitHub Actions → inpost (upward) -->
  <line x1="450" y1="430" x2="450" y2="384" stroke="#f5c842" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-gold)"/>
  <text x="470" y="412" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#f5c842">triggers</text>

</svg>
