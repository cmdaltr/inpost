<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0e18"/>
      <stop offset="100%" style="stop-color:#111420"/>
    </linearGradient>
    <linearGradient id="markG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5aee8a"/>
      <stop offset="100%" style="stop-color:#2acc5a"/>
    </linearGradient>
    <linearGradient id="arrowG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2acc5a"/>
      <stop offset="100%" style="stop-color:#5aee8a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" rx="12" fill="url(#bgL)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="100" y1="0" x2="100" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="160" rx="2" fill="url(#markG)" opacity="0.8"/>

  <!-- ─── Geometric mark: stylised ">_" terminal prompt ─── -->
  <!-- Chevron > — taller, heavier, centred vertically -->
  <polyline points="18,28 58,80 18,132" fill="none" stroke="url(#markG)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Cursor block _ -->
  <rect x="66" y="118" width="28" height="8" rx="2" fill="#5aee8a" opacity="0.9" filter="url(#glow)"/>

  <!-- Faint trailing dash from mark into wordmark -->
  <line x1="100" y1="80" x2="120" y2="80" stroke="url(#arrowG)" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- ─── Wordmark — fills horizontal space ─── -->
  <!-- "in" light blue -->
  <text x="114" y="96" fill="#7ab8e8" font-size="72" font-family="'Courier New', monospace" font-weight="bold" letter-spacing="-3">in</text>
  <!-- "post" bright white-green -->
  <text x="218" y="96" fill="#d8f0d8" font-size="72" font-family="'Courier New', monospace" font-weight="bold" letter-spacing="-3">post</text>

  <!-- Underline accent — only under "post" -->
  <line x1="218" y1="106" x2="392" y2="106" stroke="#5aee8a" stroke-width="2" opacity="0.45" filter="url(#glow)"/>

  <!-- Tagline -->
  <text x="114" y="142" fill="#2a6a4a" font-size="18" font-family="'Courier New', monospace" letter-spacing="2">NOTEBOOK → LINKEDIN</text>

  <!-- Terminal dots top-right -->
  <circle cx="356" cy="22" r="4" fill="#ff5f57" opacity="0.7"/>
  <circle cx="370" cy="22" r="4" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="384" cy="22" r="4" fill="#28c840" opacity="0.7"/>

</svg>
