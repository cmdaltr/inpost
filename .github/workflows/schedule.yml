name: Publish scheduled posts

on:
  # Runs every Monday at 11:00 UTC.
  # Europe/London (GMT) in winter:  11:00 UTC = 11:00 London  ✓
  # Europe/London (BST) in summer:  11:00 UTC = 12:00 London  (1 hour late)
  schedule:
    - cron: '0 0 29 2 1'
#    - cron: '0 8 * * 2'

  # Trigger manually from the Actions tab — useful for testing.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restore LinkedIn credentials
        run: |
          mkdir -p ~/.inpost
          echo '${{ secrets.LINKEDIN_CREDENTIALS }}' > ~/.inpost/credentials.json
          chmod 600 ~/.inpost/credentials.json

      - name: Run pipeline
        run: node dist/src/index.js schedule --once
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEFAULT_TONE: ${{ secrets.DEFAULT_TONE }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}

      - name: Notify n8n to move published pages
        # Fires after a successful publish run.
        # n8n queries Blog DB for Status=Published and moves matching pages
        # to @cmdaltr Blog. If n8n is unreachable the publish run is still
        # considered a success — the move can be triggered manually.
        if: success()
        run: |
          curl -sf --max-time 10 -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"source": "github-actions", "status": "published"}' \
            && echo "n8n notified successfully" \
            || echo "Warning: n8n webhook call failed — move pages manually if needed"
